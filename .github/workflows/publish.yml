name: Build and publish Docker image

# Builds a multi-arch Docker image from upstream integration-appletv releases and
# pushes it to GitHub Container Registry. State is tracked via GitHub Releases in
# this repo: a release named after the upstream tag is created once its image is
# built, and the scheduled run skips tags that already have a release.

on:
  schedule:
    # Poll upstream for new releases every 6 hours.
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: "Upstream tag to build (e.g. v0.22.2). Blank = latest release."
        required: false
        type: string
      force:
        description: "Rebuild even if this tag was already built."
        required: false
        type: boolean
        default: false

env:
  # Upstream source repo to track. Override here to build from a fork instead.
  UPSTREAM_REPO: unfoldedcircle/integration-appletv
  IMAGE_NAME: uc-intg-appletv

permissions:
  contents: write # create release/tag in this repo for state tracking
  packages: write # push image to ghcr.io

jobs:
  check:
    name: Resolve upstream release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
      owner: ${{ steps.resolve.outputs.owner }}
      should_build: ${{ steps.resolve.outputs.should_build }}
    steps:
      - name: Resolve tag and decide whether to build
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [ -n "${{ github.event.inputs.upstream_tag }}" ]; then
            TAG="${{ github.event.inputs.upstream_tag }}"
          else
            TAG=$(gh release view --repo "$UPSTREAM_REPO" --json tagName -q .tagName)
          fi

          if [ -z "$TAG" ]; then
            echo "Could not resolve an upstream release tag." >&2
            exit 1
          fi

          VERSION="${TAG#v}"
          OWNER="${GITHUB_REPOSITORY_OWNER,,}" # ghcr requires lowercase

          echo "Resolved upstream tag: $TAG (version $VERSION)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "owner=$OWNER" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "Force rebuild requested."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          elif gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists in this repo; skipping."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "New upstream tag $TAG; will build."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build and push image
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.should_build == 'true'
    steps:
      - name: Checkout build tooling (this repo)
        uses: actions/checkout@v4

      - name: Checkout upstream source at ${{ needs.check.outputs.tag }}
        uses: actions/checkout@v4
        with:
          repository: ${{ env.UPSTREAM_REPO }}
          ref: ${{ needs.check.outputs.tag }}
          path: src

      - name: Stage build files into upstream context
        run: cp Dockerfile .dockerignore src/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ needs.check.outputs.owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.check.outputs.version }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ env.UPSTREAM_REPO }}
            org.opencontainers.image.title=Unfolded Circle Apple TV integration
            org.opencontainers.image.description=Unofficial Docker image for ${{ env.UPSTREAM_REPO }}
            org.opencontainers.image.version=${{ needs.check.outputs.version }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: src
          file: src/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Record build as a release (state tracking)
        if: needs.check.outputs.should_build == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.check.outputs.tag }}
          VERSION: ${{ needs.check.outputs.version }}
          OWNER: ${{ needs.check.outputs.owner }}
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/${OWNER}/${IMAGE_NAME}"
          NOTES=$(cat <<EOF
          Automated Docker build of [\`${UPSTREAM_REPO}@${TAG}\`](https://github.com/${UPSTREAM_REPO}/releases/tag/${TAG}).

          Image tags:
          - \`${IMAGE}:${VERSION}\`
          - \`${IMAGE}:latest\`
          EOF
          )
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --notes "$NOTES"
          else
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG" \
              --notes "$NOTES" \
              --target "$GITHUB_SHA"
          fi
